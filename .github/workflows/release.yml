name: "Deploy Versioned Release"

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .release-please-config.json
      - uses: actions/checkout@v6
      - name: tag major and minor versions
        if: ${{ steps.release.outputs.release_created }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "<>"
          git tag -d latest || true
          git tag -d v${{ steps.release.outputs.major }}.x || true
          git tag -d v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.x || true
          git push origin :latest || true
          git push origin :v${{ steps.release.outputs.major }}.x || true
          git push origin :v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.x || true
          git tag -a latest -m "Release latest"
          git tag -a v${{ steps.release.outputs.major }}.x -m "Release v${{ steps.release.outputs.major }}.x"
          git tag -a v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.x -m "Release v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.x"
          git push origin latest
          git push origin v${{ steps.release.outputs.major }}.x
          git push origin v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.x

  deploy:
    if: ${{ needs.release.outputs.release_created }}
    needs: release
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    # Surface DOCKERHUB_USERNAME at the job level so step-level `if:` checks
    # can read `env.DOCKERHUB_USERNAME` directly. `secrets.*` is not always
    # available inside `if:` expressions, and an unset secret evaluates to ''.
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Skip Docker Hub login if the secret isn't configured (e.g. forks that
      # don't publish to Docker Hub at all). When configured, the repo target
      # is derived from DOCKERHUB_USERNAME so each fork pushes under its own
      # namespace rather than fighting upstream for nzbdav/nzbdav.
      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Set tags and NZBDAV_VERSION
        id: set_vars
        run: |
          MAJOR=${{ needs.release.outputs.major }}
          MINOR=${{ needs.release.outputs.minor }}
          PATCH=${{ needs.release.outputs.patch }}

          echo "NZBDAV_VERSION=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT

          GHCR_REPO="ghcr.io/${{ github.repository }}"
          {
            echo "TAGS<<EOF"
            echo "${GHCR_REPO}:alpha"
            echo "${GHCR_REPO}:latest"
            echo "${GHCR_REPO}:${MAJOR}.x"
            echo "${GHCR_REPO}:${MAJOR}.${MINOR}.x"
            echo "${GHCR_REPO}:${MAJOR}.${MINOR}.${PATCH}"
            if [ -n "$DOCKERHUB_USERNAME" ]; then
              DOCKERHUB_REPO="${DOCKERHUB_USERNAME}/nzbdav"
              echo "${DOCKERHUB_REPO}:alpha"
              echo "${DOCKERHUB_REPO}:latest"
              echo "${DOCKERHUB_REPO}:${MAJOR}.x"
              echo "${DOCKERHUB_REPO}:${MAJOR}.${MINOR}.x"
              echo "${DOCKERHUB_REPO}:${MAJOR}.${MINOR}.${PATCH}"
            fi
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build and push Docker image (amd64 + arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.set_vars.outputs.TAGS }}
          build-args: |
            NZBDAV_VERSION=${{ steps.set_vars.outputs.NZBDAV_VERSION }}
            REPO_URL=https://github.com/${{ github.repository }}