name: "Deploy Pre-Release Images"

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: "${{ !startsWith(github.event.head_commit.message, 'chore(main): release') }}"

    permissions:
      contents: read
      packages: write

    # Surface DOCKERHUB_USERNAME at the job level so step-level `if:` checks
    # can read `env.DOCKERHUB_USERNAME` directly. `secrets.*` is not always
    # available inside `if:` expressions, and an unset secret evaluates to ''.
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Skip Docker Hub login if the secret isn't configured (e.g. forks that
      # don't publish to Docker Hub at all). When configured, the repo target
      # is derived from DOCKERHUB_USERNAME so each fork pushes under its own
      # namespace rather than fighting upstream for nzbdav/nzbdav.
      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Set tags and NZBDAV_VERSION
        id: set_vars
        run: |
          # Docker registries require lowercase repository names; github.repository
          # preserves the original case (e.g. STiXzoOR/nzbdav), so normalize first.
          GHCR_REPO=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "NZBDAV_VERSION=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          {
            echo "TAGS<<EOF"
            echo "${GHCR_REPO}:pre-release"
            if [ -n "$DOCKERHUB_USERNAME" ]; then
              DOCKERHUB_REPO=$(echo "${DOCKERHUB_USERNAME}/nzbdav" | tr '[:upper:]' '[:lower:]')
              echo "${DOCKERHUB_REPO}:pre-release"
            fi
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build and push Docker image (amd64 + arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.set_vars.outputs.TAGS }}
          build-args: |
            NZBDAV_VERSION=${{ steps.set_vars.outputs.NZBDAV_VERSION }}
            REPO_URL=https://github.com/${{ github.repository }}
            URL_BASE=${{ vars.URL_BASE }}
